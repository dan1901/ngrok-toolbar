name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build
        run: |
          cd NgrokTools
          swift build 2>&1

      - name: Test
        run: |
          cd NgrokTools
          swift test 2>&1
