name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build
        run: |
          cd NgrokTools
          swift build

      - name: Test
        run: |
          cd NgrokTools
          swift test

  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          cd NgrokTools
          swift build 2>&1 | grep -c "error:" && exit 1 || true
