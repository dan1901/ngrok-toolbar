name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: |
          cd NgrokTools
          swift build -c release

      - name: Create app bundle
        run: |
          mkdir -p NgrokToolbar.app/Contents/MacOS
          mkdir -p NgrokToolbar.app/Contents/Resources
          cp NgrokTools/.build/release/NgrokTools NgrokToolbar.app/Contents/MacOS/
          cp NgrokTools/Info.plist NgrokToolbar.app/Contents/
          # Copy resource bundle (icons, etc.)
          if [ -d NgrokTools/.build/release/NgrokTools_NgrokTools.bundle ]; then
            cp -R NgrokTools/.build/release/NgrokTools_NgrokTools.bundle NgrokToolbar.app/Contents/Resources/
          fi
          # Copy app icon
          if [ -f NgrokTools/AppIcon.icns ]; then
            cp NgrokTools/AppIcon.icns NgrokToolbar.app/Contents/Resources/
          fi
          codesign -s - -f NgrokToolbar.app

      - name: Create tarball
        run: |
          tar -czf ngrok-toolbar-${{ github.ref_name }}-arm64.tar.gz NgrokToolbar.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ngrok-toolbar-${{ github.ref_name }}-arm64.tar.gz
          generate_release_notes: true
